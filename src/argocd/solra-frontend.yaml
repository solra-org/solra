# app-dev.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-solra-frontend
  namespace: argocd
spec:
  destination:
    namespace: solra
    server: 'https://kubernetes.default.svc'
  source:
    repoURL: 'https://github.com/fisa4th-final-project/solra-frontend.git'
    targetRevision: dev
    path: deploy/overlays/dev
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
