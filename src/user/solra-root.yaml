apiVersion: v1
kind: ServiceAccount
metadata:
  name: solra-root
  namespace: solra

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: solra-root-admin-binding
subjects:
  - kind: ServiceAccount
    name: solra-root
    namespace: solra
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
  
---

apiVersion: v1
kind: Secret
metadata:
  name: solra-root-token
  namespace: solra
  annotations:
    kubernetes.io/service-account.name: solra-root
type: kubernetes.io/service-account-token
