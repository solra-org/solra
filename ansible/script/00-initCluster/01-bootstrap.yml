- name: Bootstrap all nodes (prereqs, containerd, kube tools)
  hosts: all
  become: yes
  vars:
    k8s_version: "v1.28"
    keyring_path: "/etc/apt/keyrings/kubernetes-archive-keyring.gpg"
    repo_url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/"

  tasks:
    - name: Disable swap (required by kubeadm)
      shell: |
        swapoff -a
        sed -i '/ swap / s/^/#/' /etc/fstab
      args:
        executable: /bin/bash

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate and write containerd config
      shell: containerd config default > /etc/containerd/config.toml

    - name: Enable systemd cgroup driver in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart containerd
      service:
        name: containerd
        state: restarted

    - name: Ensure apt dependencies installed
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Configure sysctl settings
      copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: '0644'

    - name: Apply sysctl settings
      command: sysctl --system

    - name: Create apt keyrings dir
      file:
        path: "{{ keyring_path | dirname }}"
        state: directory
        mode: '0755'

    - name: Import Kubernetes apt key
      shell: curl -fsSL "{{ repo_url }}Release.key" | gpg --dearmor -o "{{ keyring_path }}"
      args:
        creates: "{{ keyring_path }}"

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by={{ keyring_path }} arch=amd64] {{ repo_url }} /"
        mode: '0644'

    - name: Update apt cache again
      apt:
        update_cache: yes

    - name: Install kube tools
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Hold Kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: fixed

