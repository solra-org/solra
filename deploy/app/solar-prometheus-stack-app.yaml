apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-monitoring-app
  namespace: argocd   # Argo CD가 설치된 네임스페이스
spec:
  project: default
  source:
    repoURL: 'https://github.com/fisa4th-final-project/solra-infra.git'
    targetRevision: dev
    path: kube-prometheus-stack
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: solra-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
