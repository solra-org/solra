expose:
  type: ingress
  tls:
    enabled: false
  ingress:
    className: nginx
    hosts:
      core: solra.harbor.com
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"

harborAdminPassword: Harbor12345

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 5Gi
      storageClass: local-path
    chartmuseum:
      size: 2Gi
      storageClass: local-path
    jobservice:
      size: 1Gi
      storageClass: local-path
    database:
      size: 2Gi
      storageClass: local-path
    redis:
      size: 1Gi
      storageClass: local-path
    trivy:
      size: 5Gi
      storageClass: local-path

trivy:
  enabled: true
  
internalTLS:
  enabled: false