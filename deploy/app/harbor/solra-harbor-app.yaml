apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-harbor-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.14.0
    helm:
      parameters:
        - name: expose.ingress.hosts.core
          value: solra.harbor.com
        - name: expose.ingress.controller
          value: nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: solra-harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
