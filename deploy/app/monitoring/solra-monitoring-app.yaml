apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-monitoring-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 56.6.2
    helm:
      valueFiles:
        - values.yaml
    path: deploy/app/monitoring  # values.yaml 파일이 있는 Git repo 내부 경로
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: solra-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true