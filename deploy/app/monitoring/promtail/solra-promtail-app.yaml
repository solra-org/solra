apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.15.5
    helm:
      values: |
        config:
          clients:
            - url: http://loki.solra-monitoring.svc.cluster.local:3100/loki/api/v1/push
          snippets:
            pipelineStages:
              - cri: {}
          scrape_configs:
            - job_name: kubernetes-pods
              pipeline_stages:
                - cri: {}
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  action: keep
                  regex: solra-backend
                - source_labels: [__meta_kubernetes_namespace]
                  action: keep
                  regex: solra
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: __host__
                - action: replace
                  source_labels: [__meta_kubernetes_pod_container_name]
                  target_label: container
                - action: replace
                  source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - action: replace
                  replacement: /var/log/containers/*.log
                  target_label: __path__
  destination:
    server: https://kubernetes.default.svc
    namespace: solra-monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
