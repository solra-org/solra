apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-kube-monkey
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/fisa4th-final-project/solra.git'
    targetRevision: dev
    path: deploy/app/kube-monkey/chart/kubemonkey
    helm:
      valueFiles:
        - ../../../values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: solra-kube-monkey
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
