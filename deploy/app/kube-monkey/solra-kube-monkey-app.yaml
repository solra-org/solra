apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-kube-monkey-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://asobti.github.io/kube-monkey/'    # Helm repo URL
    chart: kube-monkey
    targetRevision: latest
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: solra-kube-monkey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
