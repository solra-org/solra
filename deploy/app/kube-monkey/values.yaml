config:
  dryRun: true
  runHour: 15        # 오후 3시 (15시) → 스케줄 생성
  startHour: 18      # 오후 6시부터
  endHour: 19        # 오후 7시까지 실행 가능
  timeZone: "Asia/Seoul"

  whitelistedNamespaces:
    - solra
    - solra-jenkins
    - solra-harbor

  blacklistedNamespaces:
    - kube-system
    - argocd
    - redis
    - solra-gitlab
    - solra-monitoring
    - solra-cert
    - solra-kube-monkey

  debug:
    enabled: false
    schedule_immediate_kill: false

  notifications:
    enabled: true
    proxy: ""
    attacks: |
      slack = true
      email = false