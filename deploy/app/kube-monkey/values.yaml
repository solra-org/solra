config:
  dryRun: true
  runHour: 6
  startHour: 6
  endHour: 7
  timeZone: "Asia/Seoul"

  whitelistedNamespaces:
    - solra
    - solra-jenkins
    - solra-harbor

  blacklistedNamespaces:
    - kube-system
    - argocd
    - redis
    - solra-gitlab
    - solra-monitoring
    - solra-cert
    - solra-kube-monkey

  debug:
    enabled: false
    schedule_immediate_kill: false

  notifications:
    enabled: true
    proxy: ""
    attacks: |
      slack = true
      email = false