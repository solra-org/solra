apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-gitlab-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fisa4th-final-project/solra.git
    targetRevision: dev
    path: deploy/app/gitlab
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: certmanager-issuer.email
          value: ""
        - name: certmanager-issuer.install
          value: "false"
        - name: installCertmanager
          value: "false"
        - name: certmanager.enabled
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: solra-gitlab
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
