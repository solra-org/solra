# dev cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-prometheus-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/fisa4th-final-project/solra-infra.git'
    targetRevision: dev
    path: prometheus/overlays/dev
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: solra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
