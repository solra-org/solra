# dev cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-prometheus-dev-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fisa4th-final-project/solra-infra.git
    targetRevision: dev
    path: monitoring/overlays/dev
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: solra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# prod cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solra-prometheus-dev-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fisa4th-final-project/solra-infra.git
    targetRevision: main
    path: monitoring/overlays/prod
    directory:
      recurse: true
  destination:
    server: https://192.168.1.254:6443
    namespace: solra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
