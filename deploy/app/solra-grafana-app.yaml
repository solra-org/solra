apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/fisa4th-final-project/solra-infra.git'
    targetRevision: dev
    path: grafana/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: solra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
