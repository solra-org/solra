apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cluster
  namespace: argocd  # Argo CD 시스템 네임스페이스
spec:
  project: default

  source:
    repoURL: https://github.com/fisa4th-final-project/solra-redis.git
    targetRevision: dev
    path: redis-cluster

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: redis

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
