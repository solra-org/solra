# app-dev.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-solra-backend
  namespace: argocd
spec:
  destination:
    namespace: solra
    server: 'https://kubernetes.default.svc'
  source:
    repoURL: 'https://github.com/fisa4th-final-project/solra-backend.git'
    targetRevision: HEAD
    path: overlays/dev
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
